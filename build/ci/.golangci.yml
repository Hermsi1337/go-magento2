version: "2"
run:
  build-tags:
    - codeanalysis
  tests: false
  relative-path-mode: gomod
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exptostd
    - forcetypeassert
    - funlen
    - gocheckcompilerdirectives
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - lll
    - makezero
    - mirror
    - misspell
    - musttag
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagliatelle
    - testableexamples
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
  disable:
    - arangolint
    - cyclop
    - decorder
    - depguard
    - embeddedstructfieldcheck
    - err113
    - exhaustive
    - exhaustruct
    - forbidigo
    - funcorder
    - ginkgolinter
    - gochecknoglobals
    - gochecknoinits
    - godoclint
    - godot
    - godox
    - goheader
    - gomodguard
    - gosmopolitan
    - grouper
    - importas
    - ireturn
    - loggercheck
    - maintidx
    - mnd
    - nlreturn
    - noinlineerr
    - nonamedreturns
    - paralleltest
    - protogetter
    - tagalign
    - testpackage
    - unparam
    - unqueryvet
    - varnamelen
    - whitespace
    - wrapcheck
    - wsl
    - wsl_v5
    - zerologlint
  settings:
    dupl:
      threshold: 100
    errorlint:
      errorf: false
    funlen:
      lines: 100
      statements: 60
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - ifElseChain
        - commentFormatting
    gocyclo:
      min-complexity: 20
    govet:
      enable:
        - shadow
    lll:
      line-length: 180
    misspell:
      locale: US
    revive:
      confidence: 0
      severity: error
    staticcheck:
      checks:
        - "all"
        - # Omit embedded fields from selector expression.
        - "-QF1008"
    testifylint:
      disable:
        - equal-values
        - len
    nolintlint:
      allow-unused: false
    spancheck:
      extra-start-span-signatures:
        - "tracing.StartSpanFromContext:opentelemetry"
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - lll
        source: '^//go:generate '
      - linters:
          - staticcheck
        text: 'SA1019: package github.com/golang/protobuf/proto is deprecated:'
    paths:
      - .*_?generated\.go
      - tests?/
      - pkg/pb/
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 100
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - .*_?generated\.go
      - tests?/
      - pkg/pb/
      - third_party$
      - builtin$
      - examples$
